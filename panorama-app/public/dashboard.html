<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css"
    />

    <title>Panorama App</title>
  </head>
  <body>
    <div id="main-content" style="flex-direction: row">
      <div id="sidebar">
        <h1 style="margin-top: 20px" id="stitle">PANORAMA</h1>
        <button class="active">
          <i class="ph ph-chart-pie-slice"></i>Dashboard
        </button>
        <p class="section-label" style="margin-top: 15px">Projects</p>
        <button class="project">
          <i class="ph ph-list-checks"></i>Overview
        </button>
        <!-- <button class="project"><div class="project-color" ></div>Project 1</button> -->
        <button style="margin-top: 19px">
          <i class="ph ph-gear"></i>Settings
        </button>
      </div>
      <div id="dashboard-content">
        <div
          class="dashboard-row"
          style="padding-bottom: 0px; padding-top: 40px"
        >
          <h1
            style="
              font-size: 35px;
              color: black;
              margin-top: 5px;
              margin-bottom: 0px;
              line-height: 35px;
            "
          >
            Welcome to your Dashboard
          </h1>
        </div>
        <div class="dashboard-row">
          <!-- statistics cards here -->
          <div class="dashboard-card" style="flex: 1">
            <h2>Active Deployments</h2>
            <h1>5</h1>
          </div>
          <div class="dashboard-card" style="flex: 1">
            <h2>New Errors</h2>
            <h1>5</h1>
          </div>
          <div class="dashboard-card" style="flex: 1">
            <h2>Unresolved Errors</h2>
            <!-- placeholder for now as I can't find think of anything better -->
            <h1>5</h1>
          </div>
        </div>
        <div class="dashboard-row">
          <div class="dashboard-card" style="flex: 2">
            <h2>Event Timeline</h2>
            <div style="flex: 1; height: auto; width: 100%">
              <canvas id="timeline-chart"> </canvas>
            </div>
          </div>
          <div class="dashboard-card" style="flex: 1">
            <h2></h2>
            <!-- placeholder for now as I can't find think of anything better -->
            <h1>5</h1>
          </div>
        </div>
      </div>
      <div id="project-content"></div>
      <div id="sproject-content">
        <!-- individual project content view -->
      </div>
      <div id="settings-content"></div>
    </div>
  </body>
  <script
    src="https://code.jquery.com/jquery-4.0.0.min.js"
    integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
    crossorigin="anonymous"
  ></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="./main.js"></script>
</html>
